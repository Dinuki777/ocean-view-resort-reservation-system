<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exit System - Ocean View Resort</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #74b9ff, #0984e3);
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .exit-container {
        background: white;
        padding: 50px;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0,0,0,0.2);
        text-align: center;
        max-width: 500px;
    }
    .exit-container h1 {
        color: #007bff;
        margin-bottom: 20px;
    }
    .exit-container p {
        color: #666;
        font-size: 18px;
        margin-bottom: 30px;
    }
    .btn-group {
        display: flex;
        gap: 15px;
        justify-content: center;
    }
    .btn {
        padding: 12px 30px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s;
    }
    .btn-exit {
        background: #dc3545;
        color: white;
    }
    .btn-exit:hover {
        background: #c82333;
    }
    .btn-cancel {
        background: #6c757d;
        color: white;
    }
    .btn-cancel:hover {
        background: #5a6268;
    }
    .icon {
        font-size: 60px;
        margin-bottom: 20px;
    }
</style>
<body>
    <div class="exit-container">
        <div class="icon">🚪</div>
        <h1>Exit System</h1>
        <p>Are you sure you want to close the Ocean View Resort Reservation System?</p>
        
        <div class="btn-group">
            <button class="btn btn-exit" onclick="exitSystem()">Yes, Exit</button>
            <button class="btn btn-cancel" onclick="goBack()">Cancel</button>
        </div>
    </div>

    <script>
        function exitSystem() {
            // Invalidate session and redirect to login
            window.location.href = 'LogoutServlet';
        }
        
        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
