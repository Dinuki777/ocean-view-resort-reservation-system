<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
        body {
            font-family: Arial, sans-serif;
            background:linear-gradient(135deg, #74b9ff, #0984e3);;
            margin: 0;
            padding: 20px;
        }
        header {
            background: url('https://via.placeholder.com/1200x400/0984e3/ffffff?text=Ocean+View+Resort') no-repeat center center/cover;
            color: white;
            text-align: center;
            padding: 100px 20px;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1;
        }
        header h1, header p {
            position: relative;
            z-index: 2;
            margin: 0;
        }
        header h1 {
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        header p {
            font-size: 1.2em;
            margin-top: 10px;
        }
        nav {
            background-color: rgba(0,0,0,0.8);
            overflow: hidden;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        nav a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            transition: background-color 0.3s, transform 0.3s;
        }
        nav a:hover {
            background-color: #ddd;
            color: black;
            transform: scale(1.05);
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #007bff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .search-panel {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        label {
            display: inline-block;
            margin-right: 10px;
        }
        input {
            padding: 5px;
            margin-right: 10px;
        }
        button {
            padding: 5px 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .delete-btn {
            background-color: #dc3545;
        }
        .delete-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
<header>
        <h1>Ocean View Resort</h1>
        <p>Beachside Hotel in Galle - Efficient Room Reservation System</p>
    </header>
    <nav>
        <a href="Login.html">Login</a>
        <a href="main.html">Home</a>
        <a href="Add_New_Reservation.html">Add Reservation</a>
        <a href="Display_Reservation_Details.html">Display Reservation</a>
        <a href="Calculate_and_Print_Bill.html">Calculate Bill</a>
        <a href="Help_Section.html">Help</a>
        <a href="Exit.html">Exit</a>
    </nav>
<div class="container">
        <h2>Display Reservation Details</h2>
        <div class="search-panel">
            <label for="bookingNo">Booking No:</label>
            <input type="text" id="bookingNo" name="bookingNo">
            <button onclick="searchReservation()">Find</button>
            <button onclick="loadAllReservations()">Load All</button>
        </div>
        <table id="reservationTable">
            <thead>
                <tr>
                    <th>Booking No</th>
                    <th>Guest Name</th>
                    <th>Address</th>
                    <th>Contact Number</th>
                    <th>Room Type</th>
                    <th>Room Number</th>
                    <th>Check-In</th>
                    <th>Check-Out</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Table rows will be populated here -->
            </tbody>
        </table>
    </div>

    <script>
    
        // Load all reservations on page load
        window.onload = loadAllReservations;

        function loadAllReservations() {
            fetch('DisplayReservationServlet?action=loadAll')
                .then(response => response.json())
                .then(data => populateTable(data))
                .catch(error => console.error('Error loading reservations:', error));
        }

        function searchReservation() {
            const bookingNo = document.getElementById('bookingNo').value;
            if (!bookingNo) {
                alert('Please enter Booking Number!');
                return;
            }
            fetch(`DisplayReservationServlet?action=search&bookingNo=${bookingNo}`)
                .then(response => response.json())
                .then(data => {
                    if (data.length === 0) {
                        alert('No Record Found!');
                        populateTable([]);
                    } else {
                        populateTable(data);
                    }
                })
                .catch(error => console.error('Error searching:', error));
        }

        function deleteReservation(bookingNo) {
            if (confirm('Are you sure you want to delete?')) {
                fetch(`DisplayReservationServlet?action=delete&bookingNo=${bookingNo}`, { method: 'POST' })
                    .then(response => response.text())
                    .then(message => {
                        alert(message);
                        loadAllReservations(); // Refresh table
                    })
                    .catch(error => console.error('Error deleting:', error));
            }
        }

        function populateTable(data) {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            data.forEach(reservation => {
                const row = `<tr>
                    <td>${reservation.booking_no}</td>
                    <td>${reservation.guest_name}</td>
                    <td>${reservation.address}</td>
                    <td>${reservation.contact_number}</td>
                    <td>${reservation.room_type}</td>
                    <td>${reservation.room_number}</td>
                    <td>${reservation.check_in}</td>
                    <td>${reservation.check_out}</td>
                    <td><button class="delete-btn" onclick="deleteReservation(${reservation.booking_no})">Delete</button></td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        }
    </script>
</body>
</html>
